<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contacto — Madeleyne Aliaga</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="stylesheet" href="css/contacto.css" />
</head>
<body class="pagina-negra">

  <nav class="navbar navbar-negra" id="navbar">
    <a href="index.html" class="nav-logo">MADELEYNE ALIAGA</a>
    <button class="nav-toggle" id="navToggle" aria-label="Menú">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links nav-links-negra" id="navLinks">
      <li><a href="portafolio.html">PORTAFOLIO</a></li>
      <li><a href="acerca.html">ACERCA DE MÍ</a></li>
      <li><a href="contacto.html" class="activo">CONTACTO</a></li>
    </ul>
  </nav>

  <main class="contacto-main">

    <!-- FOTO IZQUIERDA -->
    <div class="contacto-foto">
      <img src="img/contact.png" alt="Madeleyne Aliaga" />
    </div>

    <!-- CONTENIDO DERECHA -->
    <div class="contacto-contenido">
      
      <p class="contacto-escribe">
        ESCRIBE A : <a href="mailto:madeleinealiagaabanto@gmail.com">MADELEINEALIAGAABANTO@GMAIL.COM</a>
      </p>

      <form class="contacto-form" action="https://formspree.io/f/xaqaqznq" method="POST">
        <div class="form-fila">
          <div class="form-grupo">
            <input type="text" name="nombre" placeholder="NOMBRE" required />
          </div>
          <div class="form-grupo">
            <input type="email" name="email" placeholder="EMAIL" required />
          </div>
        </div>
        <div class="form-grupo">
          <input type="text" name="asunto" placeholder="ASUNTO" />
        </div>
        <div class="form-grupo">
          <textarea name="mensaje" placeholder="CUÉNTAME SOBRE TU PROYECTO..." rows="5" required></textarea>
        </div>
        <button type="submit" class="form-btn">ENVIAR MENSAJE</button>
        <p class="form-success" id="formSuccess">¡Mensaje enviado! Me pondré en contacto pronto.</p>
      </form>
    </div>

  </main>

  <footer class="footer">
    <div class="footer-bottom footer-bottom-contacto">
      <div class="footer-info">

        <span>FOTÓGRAFA | FILMAKER</span>
        <span>LIMA, PERÚ</span>
      </div>
      <div class="footer-links">
        <a href="mailto:madeleinealiagaabanto@gmail.com" class="footer-link">EMAIL<span class="footer-link-linea"></span></a>
        <a href="https://www.instagram.com/madeleynealiaga31" target="_blank" rel="noopener" class="footer-link">INSTAGRAM<span class="footer-link-linea"></span></a>
        <a href="https://vimeo.com/madeleynealiaga" target="_blank" rel="noopener" class="footer-link">VIMEO<span class="footer-link-linea"></span></a>
      </div>
      <div class="footer-iniciales">
        <span class="inicial">M</span>
        <span class="inicial-punto">.</span>
        <span class="inicial">A</span>
      </div>
      <div class="footer-madeby"><span>MADE BY DIDOCO92</span></div>
    </div>
  </footer>

  <script src="js/main.js"></script>
  <script>
    const form = document.querySelector('.contacto-form');
    const success = document.getElementById('formSuccess');
    if (form) {
      form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const data = new FormData(form);
        const res = await fetch(form.action, {
          method: 'POST',
          body: data,
          headers: { 'Accept': 'application/json' }
        });
        if (res.ok) {
          form.reset();
          success.style.display = 'block';
          setTimeout(() => success.style.display = 'none', 5000);
        }
      });
    }
  </script>
</body>
</html>
